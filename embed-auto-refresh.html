<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sweetgreen Dashboard – Auto Refresh</title>

  <!-- Tableau Embedding API v3 — loaded from YOUR Tableau Online instance, not public.tableau.com -->
  <script type="module"
    src="https://10ay.online.tableau.com/javascripts/api/tableau.embedding.3.latest.js">
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Tableau viz fills the page ── */
    tableau-viz {
      flex: 1;
      width: 100%;
      display: block;
    }

    /* ── Floating refresh bar (bottom-right) ── */
    #refresh-bar {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      user-select: none;
    }

    /* Miniature ring */
    .mini-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .mini-ring svg { transform: rotate(-90deg); }
    .ring-bg2  { fill: none; stroke: #ecf0f1; stroke-width: 5; }
    .ring-fill2 {
      fill: none;
      stroke: #27ae60;
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear;
    }
    .mini-ring .mini-num {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 11px; font-weight: 800; color: #2c3e50;
    }

    .bar-info { display: flex; flex-direction: column; gap: 2px; }
    .bar-label { font-size: 11px; font-weight: 700; color: #2c3e50; }
    .bar-sub   { font-size: 10px; color: #7f8c8d; }

    /* Controls */
    .bar-btns { display: flex; gap: 5px; }
    .bar-btns button {
      padding: 4px 9px; font-size: 11px; font-weight: 700;
      border: none; border-radius: 5px; cursor: pointer;
    }
    #barBtnStart { background: #27ae60; color: #fff; }
    #barBtnStop  { background: #e74c3c; color: #fff; }
    #barBtnNow   { background: #2980b9; color: #fff; }

    /* Interval input */
    .bar-interval {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: #555;
    }
    .bar-interval input {
      width: 42px; padding: 3px 4px; font-size: 11px;
      border: 1px solid #ccc; border-radius: 4px; text-align: center;
    }

    /* Last refresh */
    #barLastRefresh { font-size: 10px; color: #888; white-space: nowrap; }

    /* Loading overlay */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999; color: #2c3e50;
      gap: 16px;
    }
    #loadingOverlay .spinner {
      width: 48px; height: 48px;
      border: 5px solid #e0e0e0;
      border-top-color: #27ae60;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingOverlay .load-title { font-size: 16px; font-weight: 700; color: #2c3e50; }
    #loadingOverlay .load-sub   { font-size: 12px; color: #7f8c8d; text-align: center; max-width: 320px; }
    #loadingOverlay .load-err   { font-size: 12px; color: #e74c3c; text-align: center; max-width: 360px; display: none; }
    #loadingOverlay .load-link  { margin-top: 8px; font-size: 12px; }
    #loadingOverlay .load-link a { color: #3498db; }
  </style>
</head>
<body>

  <!-- Loading overlay — hidden once viz is interactive -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="load-title">Loading Sweetgreen Dashboard…</div>
    <div class="load-sub">You may be prompted to sign into Tableau Online. Please log in and the dashboard will appear automatically.</div>
    <div class="load-err" id="loadErr"></div>
    <div class="load-link">
      <a href="https://10ay.online.tableau.com" target="_blank">Open Tableau Online directly ↗</a>
    </div>
  </div>
  <tableau-viz
    id="tableauViz"
    src="https://10ay.online.tableau.com/#/site/sweetgreen/views/TodaysFrontlineThroughput_Fix/TodaysFrontlineThroughput"
    toolbar="bottom"
    hide-tabs>
  </tableau-viz>

  <!-- Floating auto-refresh control bar -->
  <div id="refresh-bar">

    <!-- Countdown ring -->
    <div class="mini-ring">
      <svg viewBox="0 0 44 44" width="44" height="44">
        <circle class="ring-bg2"   cx="22" cy="22" r="17"/>
        <circle class="ring-fill2" id="miniRing" cx="22" cy="22" r="17"
                stroke-dasharray="107" stroke-dashoffset="0"/>
      </svg>
      <div class="mini-num" id="miniCount">60</div>
    </div>

    <!-- Info -->
    <div class="bar-info">
      <span class="bar-label">⟳ Auto Refresh</span>
      <span class="bar-sub" id="barLastRefresh">Last refresh: —</span>
    </div>

    <!-- Interval -->
    <div class="bar-interval">
      <span>Every</span>
      <input type="number" id="barInterval" value="60" min="5" max="86400"/>
      <span>s</span>
    </div>

    <!-- Buttons -->
    <div class="bar-btns">
      <button id="barBtnStart" onclick="startTimer()">▶</button>
      <button id="barBtnStop"  onclick="stopTimer()">■</button>
      <button id="barBtnNow"   onclick="refreshNow()">↺</button>
    </div>
  </div>

<script type="module">
  // ── Constants ──────────────────────────────────────────────────────────────
  const CIRC = 2 * Math.PI * 17;   // circumference for r=17

  // ── State ──────────────────────────────────────────────────────────────────
  let intervalSecs = 60;
  let currentTick  = 60;
  let timerHandle  = null;
  let vizReady     = false;

  const viz          = document.getElementById('tableauViz');
  const miniRing     = document.getElementById('miniRing');
  const miniCount    = document.getElementById('miniCount');
  const barInterval  = document.getElementById('barInterval');
  const barLast      = document.getElementById('barLastRefresh');

  // ── Ring helper ────────────────────────────────────────────────────────────
  function updateRing(remaining, total) {
    const frac   = remaining / total;
    const offset = CIRC * (1 - frac);
    miniRing.style.strokeDashoffset = offset;
    miniCount.textContent = remaining;
  }

  // ── Last-refresh timestamp ─────────────────────────────────────────────────
  function stampLastRefresh() {
    const t = new Date().toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    barLast.textContent = 'Last refresh: ' + t;
  }

  // ── Core refresh — uses viz.refreshDataAsync() ─────────────────────────────
  // This is the EXACT same call as the native "Refresh data in the view"
  // toolbar button (3rd icon) in Tableau Online.
  window.refreshNow = async function() {
    currentTick = intervalSecs;
    updateRing(currentTick, intervalSecs);
    stampLastRefresh();

    if (!vizReady) {
      barLast.textContent = 'Waiting for viz…';
      return;
    }

    try {
      await viz.refreshDataAsync();     // ← Tableau Embedding API v3 call
      console.log('Dashboard refreshed via viz.refreshDataAsync()');
    } catch (err) {
      console.error('refreshDataAsync error:', err);
      barLast.textContent = 'Refresh error — see console';
    }
  };

  // ── Timer ──────────────────────────────────────────────────────────────────
  window.startTimer = function() {
    intervalSecs = parseInt(barInterval.value, 10);
    if (isNaN(intervalSecs) || intervalSecs < 5) {
      intervalSecs = 5;
      barInterval.value = 5;
    }
    currentTick = intervalSecs;
    updateRing(currentTick, intervalSecs);
    if (timerHandle) clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      currentTick--;
      if (currentTick < 0) currentTick = 0;
      updateRing(currentTick, intervalSecs);
      if (currentTick === 0) window.refreshNow();
    }, 1000);
  };

  window.stopTimer = function() {
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    barLast.textContent = 'Auto-refresh paused.';
  };

  // ── Wait for viz to finish loading, then auto-start ───────────────────────
  // 'firstinteractive' fires when Tableau viz is fully loaded and interactive
  viz.addEventListener('firstinteractive', () => {
    vizReady = true;
    console.log('Tableau viz ready');
    // Hide the loading overlay
    document.getElementById('loadingOverlay').style.display = 'none';
    // Start the countdown
    window.startTimer();
  });

  // ── Handle viz load errors ─────────────────────────────────────────────────
  viz.addEventListener('vizloaderror', (err) => {
    console.error('Viz load error:', err);
    const errEl = document.getElementById('loadErr');
    errEl.style.display = 'block';
    errEl.textContent = 'Error loading dashboard: ' + (err.detail?.message || 'Check that you are logged into Tableau Online and the URL is correct.');
  });

  // ── 30s fallback: if overlay still showing, hint the user ─────────────────
  setTimeout(() => {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay.style.display !== 'none') {
      const sub = overlay.querySelector('.load-sub');
      sub.textContent = 'Still loading… If nothing appears, click the link below to log into Tableau Online first, then return to this page.';
    }
  }, 30000);

</script>
</body>
</html>
